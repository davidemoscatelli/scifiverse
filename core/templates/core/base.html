{% load static %}

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Scifiverse - Storie. Futuro. Immaginazione.{% endblock %}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="manifest" href="{% static 'manifest.json' %}">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Scifiverse">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        scifi: {
                            bg: '#050505',       /* Nero quasi puro per il fondo */
                            card: '#0f0f0f',     /* Grigio scurissimo per le card */
                            accent: '#cba165',   /* Il nuovo Oro/Ambra */
                            text: '#e0e0e0',     /* Testo chiaro */
                            muted: '#808080',    /* Testo secondario */
                            border: '#1f1f1f'    /* Bordi sottili */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        .noise-bg { position: relative; }
        .noise-bg::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.05; pointer-events: none; z-index: 50;
        }
        body { background-color: #050505; color: #e0e0e0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans antialiased noise-bg min-h-screen pb-24 md:pb-0"> 
    
    <main class="max-w-md md:max-w-4xl lg:max-w-5xl mx-auto w-full relative z-10">
        {% block content %}
        {% endblock %}
    </main>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registrato con successo con scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('Registrazione ServiceWorker fallita: ', err);
                    });
            });
        }
    </script>
</body>
</html>
